<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Size Cá</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 pb-20">

    <!-- Header -->
    <header class="bg-slate-900 text-white p-4 md:p-6 shadow-xl sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i class="fas fa-calculator fa-lg"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black uppercase tracking-tight leading-none mb-1">Hệ thống Quản lý Size Cá</h1>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Đồng bộ Cloud & Xuất Excel</p>
                </div>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <button id="btnSaveCloud" onclick="handleSaveCloud()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-700 text-white px-4 py-2 rounded-xl font-bold transition-all shadow-lg active:scale-95 text-sm">
                    <i class="fas fa-cloud-upload-alt"></i> <span>LƯU CLOUD</span>
                </button>
                <button onclick="exportToExcel()" class="flex-1 md:flex-none flex items-center justify-center gap-2 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-xl font-bold transition-all shadow-lg active:scale-95 text-sm">
                    <i class="fas fa-file-excel"></i> <span>EXCEL</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:mt-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Cột trái: Form nhập liệu -->
        <div class="lg:col-span-4 space-y-6">
            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-[10px] font-black uppercase text-slate-400 mb-4 flex items-center gap-2">
                    <i class="fas fa-user text-[10px]"></i> Định danh ao nuôi
                </h2>
                <div class="space-y-3">
                    <input id="ownerName" type="text" placeholder="Tên chủ ao..." class="w-full p-2.5 bg-slate-50 border rounded-lg font-bold text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <input id="pondCode" type="text" placeholder="Mã số ao..." class="w-full p-2.5 bg-slate-50 border rounded-lg font-bold text-sm focus:ring-2 focus:ring-blue-500 outline-none uppercase">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="address" type="text" placeholder="Khu vực..." class="p-2.5 bg-slate-50 border rounded-lg text-xs font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                        <input id="expectedYield" type="number" placeholder="Sản lượng (kg)" class="p-2.5 bg-slate-50 border rounded-lg text-xs font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
            </section>

            <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-[10px] font-black uppercase text-slate-400 mb-4 flex items-center gap-2">
                    <i class="fas fa-plus-circle text-[10px]"></i> Nhập trọng lượng Gram
                </h2>
                <div class="space-y-3 mb-4">
                    <input id="weightInput" type="number" placeholder="Số g..." class="w-full p-4 bg-blue-50 border border-blue-100 rounded-xl text-2xl font-black text-center focus:border-blue-500 outline-none">
                    <button id="btnAddSample" onclick="addSample()" class="w-full bg-slate-900 text-white py-3.5 rounded-xl font-black transition-all active:scale-95 shadow-md flex items-center justify-center gap-2 text-sm">
                        <i class="fas fa-plus"></i> THÊM MẪU
                    </button>
                </div>
                
                <div id="sampleList" class="h-56 overflow-y-auto bg-slate-50 rounded-xl p-2 space-y-1 border shadow-inner custom-scroll">
                    <div class="h-full flex items-center justify-center text-slate-300 italic text-[10px]">Chưa có mẫu nào</div>
                </div>
                <div id="clearAllSection" class="hidden">
                    <button onclick="clearAllSamples()" class="w-full mt-3 text-[9px] font-bold text-red-400 uppercase tracking-tighter hover:underline text-center">Xóa tất cả mẫu</button>
                </div>
            </section>
        </div>

        <!-- Cột phải: Thống kê & Lịch sử -->
        <div class="lg:col-span-8 space-y-6">
            <!-- Dashboard nhanh -->
            <div class="grid grid-cols-3 gap-3">
                <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                    <p class="text-[9px] font-bold text-slate-400 uppercase mb-1 text-center">Số mẫu</p>
                    <h3 class="text-xl font-black text-slate-900 text-center"><span id="statCount">0</span> <small class="text-[10px] text-slate-400 font-normal">con</small></h3>
                </div>
                <div class="bg-white p-4 rounded-2xl border-2 border-blue-500 shadow-sm">
                    <p class="text-[9px] font-bold text-blue-500 uppercase mb-1 text-center">Size TB</p>
                    <h3 class="text-xl font-black text-slate-900 text-center"><span id="statAvg">0</span> <small class="text-[10px] text-slate-400 font-normal">g</small></h3>
                </div>
                <div class="bg-emerald-600 p-4 rounded-2xl shadow-sm text-white">
                    <p class="text-[9px] font-bold text-emerald-100 uppercase mb-1 text-center">Khối lượng</p>
                    <h3 class="text-xl font-black text-center"><span id="statWeight">0.00</span> <small class="text-[10px] text-emerald-100 font-normal">kg</small></h3>
                </div>
            </div>

            <!-- Bảng chi tiết -->
            <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                <div class="bg-slate-900 px-4 py-3 text-white flex justify-between items-center">
                    <h2 class="text-[10px] font-black uppercase tracking-widest">Phân tích dải size thực tế</h2>
                </div>
                <table class="w-full text-xs">
                    <thead class="bg-slate-50 border-b">
                        <tr class="text-[9px] font-black text-slate-400 uppercase">
                            <th class="p-3 text-left">Dải Trọng Lượng</th>
                            <th class="p-3 text-center">Số lượng</th>
                            <th class="p-3 text-center">Tổng g</th>
                            <th class="p-3 text-right">Tỷ lệ</th>
                        </tr>
                    </thead>
                    <tbody id="analysisTable" class="divide-y divide-slate-100">
                        <!-- JS renders here -->
                    </tbody>
                </table>
            </div>

            <!-- Lịch sử Cloud -->
            <section class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                <div class="p-3 bg-slate-50 border-b flex items-center justify-between">
                    <h2 class="text-[10px] font-black uppercase text-slate-500 flex items-center gap-2">
                        <i class="fas fa-history text-[10px]"></i> Lịch sử kiểm size gần đây
                    </h2>
                    <i class="fas fa-database text-slate-300 text-[10px]"></i>
                </div>
                <div class="max-h-80 overflow-y-auto custom-scroll">
                    <table class="w-full text-xs">
                        <thead class="bg-slate-50/50 text-[9px] font-bold text-slate-400 uppercase">
                            <tr>
                                <th class="p-3 text-left">Ngày</th>
                                <th class="p-3 text-left">Ao / Chủ</th>
                                <th class="p-3 text-center text-blue-500">Size TB</th>
                                <th class="p-3 text-right">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="historyTable" class="divide-y divide-slate-50">
                            <!-- JS renders here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, Timestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // State Management
        let samples = [];
        let thresholds = [300, 400, 600, 800, 1000, 1300, 1600];
        let currentUser = null;
        let db = null;
        let auth = null;
        let appId = 'fish-size-app';

        // Initialize Firebase safely
        const startFirebase = async () => {
            try {
                if (typeof __firebase_config !== 'undefined') {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);
                    appId = typeof __app_id !== 'undefined' ? __app_id : 'fish-size-app';

                    // Auth Setup
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    onAuthStateChanged(auth, (user) => {
                        currentUser = user;
                        if (user) initFirestoreSync();
                    });
                }
            } catch (err) {
                console.warn("Firebase not configured or fails. Running in local-only mode.");
            }
        };

        // Firestore Sync
        const initFirestoreSync = () => {
            if (!currentUser || !db) return;
            const q = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'reports');
            onSnapshot(q, (snapshot) => {
                const history = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderHistory(history.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
            }, (error) => {
                console.error("Firestore Error:", error);
            });
        };

        // UI Core Logic (Expose to window for onclick)
        window.addSample = () => {
            const input = document.getElementById('weightInput');
            const val = parseFloat(input.value);
            if (!isNaN(val) && val > 0) {
                if (samples.length >= 500) {
                    alert("Giới hạn 500 mẫu mỗi lần kiểm.");
                    return;
                }
                samples.push(val);
                input.value = '';
                input.focus();
                updateUI();
            }
        };

        window.removeSample = (index) => {
            samples.splice(index, 1);
            updateUI();
        };

        window.clearAllSamples = () => {
            if (confirm("Xóa toàn bộ dữ liệu mẫu hiện tại?")) {
                samples = [];
                updateUI();
            }
        };

        const updateUI = () => {
            renderSampleList();
            renderStats();
            renderAnalysis();
        };

        const renderSampleList = () => {
            const list = document.getElementById('sampleList');
            const clearBtn = document.getElementById('clearAllSection');
            
            if (samples.length === 0) {
                list.innerHTML = '<div class="h-full flex items-center justify-center text-slate-300 italic text-[10px]">Chưa có mẫu nào</div>';
                clearBtn.classList.add('hidden');
                return;
            }

            clearBtn.classList.remove('hidden');
            list.innerHTML = [...samples].reverse().map((s, i) => `
                <div class="flex justify-between items-center px-3 py-2 bg-white rounded-lg shadow-sm border border-slate-100">
                    <span class="text-[9px] font-bold text-slate-300">#${samples.length - i}</span>
                    <span class="font-black text-slate-700 text-sm">${s}g</span>
                    <button onclick="removeSample(${samples.length - 1 - i})" class="text-red-300 hover:text-red-500 transition-all">
                        <i class="fas fa-trash text-[12px]"></i>
                    </button>
                </div>
            `).join('');
        };

        const renderStats = () => {
            const total = samples.length;
            const weightSum = samples.reduce((a, b) => a + b, 0);
            const avg = total > 0 ? Math.round(weightSum / total) : 0;
            const kg = (weightSum / 1000).toFixed(2);

            document.getElementById('statCount').innerText = total;
            document.getElementById('statAvg').innerText = avg;
            document.getElementById('statWeight').innerText = kg;
        };

        const renderAnalysis = () => {
            const tbody = document.getElementById('analysisTable');
            if (samples.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-300 italic">Chưa có dữ liệu phân tích</td></tr>';
                return;
            }

            const sortedT = [...thresholds].sort((a, b) => a - b);
            let bins = [{ label: `Dưới ${sortedT[0]}g`, min: 0, max: sortedT[0], count: 0, weight: 0 }];
            for (let i = 0; i < sortedT.length - 1; i++) {
                bins.push({ label: `${sortedT[i]} - ${sortedT[i+1]}g`, min: sortedT[i], max: sortedT[i+1], count: 0, weight: 0 });
            }
            bins.push({ label: `Trên ${sortedT[sortedT.length-1]}g (UP)`, min: sortedT[sortedT.length-1], max: Infinity, count: 0, weight: 0 });

            samples.forEach(s => {
                for (let bin of bins) {
                    if (s >= bin.min && s < bin.max) {
                        bin.count++;
                        bin.weight += s;
                        break;
                    }
                }
            });

            tbody.innerHTML = bins.map(bin => {
                const percent = samples.length > 0 ? ((bin.count / samples.length) * 100).toFixed(1) : '0.0';
                return `
                    <tr class="hover:bg-blue-50/50 transition-colors">
                        <td class="p-3 font-bold text-slate-600">${bin.label}</td>
                        <td class="p-3 text-center font-black text-blue-600">${bin.count}</td>
                        <td class="p-3 text-center text-slate-400 font-medium">${bin.weight.toLocaleString()}g</td>
                        <td class="p-3 text-right font-black text-slate-900">${percent}%</td>
                    </tr>
                `;
            }).join('');
        };

        const renderHistory = (history) => {
            const tbody = document.getElementById('historyTable');
            if (history.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center text-slate-300 italic">Không có dữ liệu lưu trữ</td></tr>';
                return;
            }

            tbody.innerHTML = history.map(item => `
                <tr class="hover:bg-slate-50 transition-all">
                    <td class="p-3 text-slate-500 font-medium text-[10px]">
                        ${item.createdAt?.toDate().toLocaleDateString('vi-VN')}
                    </td>
                    <td class="p-3">
                        <div class="font-bold text-slate-800 leading-none mb-1 text-xs">${item.ownerName || '---'}</div>
                        <div class="text-[9px] font-bold text-blue-500 uppercase">${item.pondCode || 'NO-CODE'}</div>
                    </td>
                    <td class="p-3 text-center font-black text-blue-600">${item.avgWeight}g</td>
                    <td class="p-3 text-right">
                        <div class="flex justify-end gap-1">
                            <button class="p-1.5 text-blue-600 hover:bg-blue-100 rounded-md load-btn" data-id="${item.id}">
                                <i class="fas fa-external-link-alt text-[10px]"></i>
                            </button>
                            <button onclick="deleteReport('${item.id}')" class="p-1.5 text-red-300 hover:text-red-500 hover:bg-red-50 rounded-md">
                                <i class="fas fa-trash-alt text-[10px]"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');

            document.querySelectorAll('.load-btn').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.getAttribute('data-id');
                    const data = history.find(h => h.id === id);
                    if (data) {
                        document.getElementById('ownerName').value = data.ownerName || '';
                        document.getElementById('pondCode').value = data.pondCode || '';
                        document.getElementById('address').value = data.address || '';
                        document.getElementById('expectedYield').value = data.expectedYield || '';
                        samples = [...data.samples];
                        updateUI();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                };
            });
        };

        window.deleteReport = async (id) => {
            if (!currentUser || !db || !confirm("Xóa báo cáo này vĩnh viễn?")) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'reports', id));
        };

        window.handleSaveCloud = async () => {
            if (!db || !currentUser) {
                alert("Cloud chưa được cấu hình. Vui lòng sử dụng trên môi trường có Firebase.");
                return;
            }
            if (samples.length === 0) {
                alert("Hãy nhập dữ liệu mẫu trước!");
                return;
            }
            
            const btn = document.getElementById('btnSaveCloud');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>ĐANG LƯU...</span>';

            try {
                const reportId = `REP-${Date.now()}`;
                const weightSum = samples.reduce((a, b) => a + b, 0);
                const avg = Math.round(weightSum / samples.length);
                
                await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'reports', reportId), {
                    ownerName: document.getElementById('ownerName').value,
                    address: document.getElementById('address').value,
                    pondCode: document.getElementById('pondCode').value,
                    expectedYield: document.getElementById('expectedYield').value,
                    samples,
                    thresholds,
                    totalCount: samples.length,
                    avgWeight: avg,
                    totalWeightKg: (weightSum / 1000).toFixed(2),
                    createdAt: Timestamp.now()
                });
                alert("Lưu Cloud thành công!");
            } catch (e) {
                console.error("Save error:", e);
                alert("Lỗi khi lưu dữ liệu lên Cloud.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> <span>LƯU CLOUD</span>';
            }
        };

        window.exportToExcel = () => {
            if (samples.length === 0) return;
            const pond = document.getElementById('pondCode').value || 'Report';
            
            const sortedT = [...thresholds].sort((a, b) => a - b);
            let bins = [{ label: `Dưới ${sortedT[0]}g`, min: 0, max: sortedT[0], count: 0, weight: 0 }];
            for (let i = 0; i < sortedT.length - 1; i++) {
                bins.push({ label: `${sortedT[i]} - ${sortedT[i+1]}g`, min: sortedT[i], max: sortedT[i+1], count: 0, weight: 0 });
            }
            bins.push({ label: `Trên ${sortedT[sortedT.length-1]}g (UP)`, min: sortedT[sortedT.length-1], max: Infinity, count: 0, weight: 0 });
            samples.forEach(s => {
                for (let bin of bins) {
                    if (s >= bin.min && s < bin.max) { bin.count++; bin.weight += s; break; }
                }
            });

            const reportData = [
                ["BÁO CÁO PHÂN TÍCH SIZE CÁ"],
                ["Ngày xuất:", new Date().toLocaleString('vi-VN')],
                [],
                ["THÔNG TIN KHÁCH HÀNG"],
                ["Chủ ao:", document.getElementById('ownerName').value],
                ["Mã ao:", pond],
                ["Khu vực:", document.getElementById('address').value],
                [],
                ["KẾT QUẢ TỔNG HỢP"],
                ["Số lượng mẫu:", samples.length + " con"],
                ["Trọng lượng TB:", Math.round(samples.reduce((a,b)=>a+b,0)/samples.length) + " g"],
                [],
                ["CHI TIẾT PHÂN LOẠI"],
                ["Dải Size", "Số lượng", "Khối lượng (g)", "Tỷ lệ (%)"]
            ];

            bins.forEach(b => {
                const percent = ((b.count / samples.length) * 100).toFixed(1) + "%";
                reportData.push([b.label, b.count, b.weight, percent]);
            });

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(reportData);
            XLSX.utils.book_append_sheet(wb, ws, "Báo cáo");
            XLSX.writeFile(wb, `Size_Ca_${pond}.xlsx`);
        };

        // Enter key support
        document.getElementById('weightInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.addSample();
        });

        // Start initialization
        startFirebase();

    </script>
</body>
</html>
